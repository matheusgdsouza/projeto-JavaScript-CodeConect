<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./Styles/styles.css">
    <title>CodeConnect</title>
</head>

<body>
    <main class="principal">
        <aside class="container-menu-lateral">
            <img src="./img/Logo.svg" alt="Logo CodeConnect" class="menu-lateral-logo">
            <a href="#" class="menu-lateral-botao">Publicar</a>
            <nav class="navegacao-menu-lateral">
                <ul class="lista-navegacao">
                    <li class="item-lista-navegacao">
                        <img src="./img/feed.svg" alt="Icone Feed" class="icone-navegacao">
                        <a href="#" class="link-navegacao">Feed</a>
                    </li>
                    <li class="item-lista-navegacao">
                        <img src="./img/account_circle.svg" alt="Icone Conta" class="icone-navegacao">
                        <a href="#" class="link-navegacao">Perfil</a>
                    </li>
                    <li class="item-lista-navegacao">
                        <img src="./img/info.svg" alt="Icone Info" class="icone-navegacao">
                        <a href="#" class="link-navegacao">Sobre nós</a>
                    </li>
                    <li class="item-lista-navegacao">
                        <img src="./img/logout.svg" alt="Icone Logout" class="icone-navegacao">
                        <a href="#" class="link-navegacao">Sair</a>
                    </li>
                </ul>
            </nav>
        </aside>

        <section class="card-principal">
            <div class="container1-card-principal">
                <div class="containet-img">
                    <img src="./img/imagem1.png" alt="Imagem 1" class="img-card-principal">
                </div>
                <button class="botao-carregar-imagem">Carregar imagem <img src="./img/upload.svg" alt="Icone Upload" class="img-botao-enviar"></button>
                <input type="file" name="input-imagem" id="input-imagem" accept="image/*" style="display: none;">
                <ul class="lista-imagens"> 
                </ul>
            </div>

            <div class="container2-card-principal">
                <h2 class="card-principal-titulo-projeto">Novo projeto</h2>
                <div class="container-nome-projeto">
                    <label class="label-nome-projeto" for="input-nome-projeto">Nome do projeto</label>
                    <input type="text" name="input-nome-projeto" id="input-nome-projeto" placeholder="Digite aqui o nome do seu projeto">
                </div>
                <div class="container-descricao-projeto">
                    <label class="label-descricao-projeto" for="input-descricao-projeto">Descrição</label>
                    <textarea name="input-descricao-projeto" id="input-descricao-projeto" placeholder="Descreva seu projeto"></textarea>
                </div>
                <div class="container-tags-projeto">
                    <label class="label-tags-projeto" for="input-tags-projeto">Tags</label>
                    <input type="text" name="input-tags-projeto" id="input-tags-projeto" placeholder="Adicione tags">
                </div>
                <ul class="lista-tags-projeto">

                </ul>
                <div class="container-botoes-projeto">
                    <button class="botao-descartar-projeto">Descartar <img src="./img/trash.svg" alt="Icone lixo"></button>
                    <button class="botao-publicar-projeto">Publicar <img src="./img/arrow_forward2.svg" alt="Icone Upload"></button>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
