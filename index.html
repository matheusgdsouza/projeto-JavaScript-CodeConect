<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./Styles/styles.css">
    <title>CodeConnect</title>
</head>

<body>
    <main class="principal">
        <section class="container-menu-lateral">
            <img src="./img/Logo.svg" alt="Logo CodeConnect" class="menu-lateral-logo">
            <button class="menu-lateral-botao">Publicar</button>
            <nav class="navegacao-menu-lateral">
                <ul class="lista-navegacao">
                    <li class="item-lista-navegacao">
                        <img src="./img/feed.svg" alt="Icone Feed" class="icone-navegacao">
                        <a href="#" class="link-navegacao">Feed</a>
                    </li>
                    <li class="item-lista-navegacao">
                        <img src="./img/account_circle.svg" alt="Icone Conta" class="icone-navegacao">
                        <a href="#" class="link-navegacao">Perfil</a>
                    </li>
                    <li class="item-lista-navegacao">
                        <img src="./img/info.svg" alt="Icone Info" class="icone-navegacao">
                        <a href="#" class="link-navegacao">Sobre nós</a>
                    </li>
                    <li class="item-lista-navegacao">
                        <img src="./img/logout.svg" alt="Icone Logout" class="icone-navegacao">
                        <a href="#" class="link-navegacao">Sair</a>
                    </li>
                </ul>
            </nav>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
